<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radar Tracking Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green:     #00ff41;
    --green-dim: #00c832;
    --green-dk:  #003a0e;
    --amber:     #ffb700;
    --red:       #ff3b3b;
    --blue:      #00cfff;
    --bg:        #020c04;
    --panel:     #030f05;
    --border:    rgba(0,255,65,0.22);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
  }

  /* ── Header ── */
  header {
    width: 100%; max-width: 1160px;
    padding: 16px 28px 10px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-family:'Orbitron',monospace; font-weight:900; font-size:1.2rem; letter-spacing:.18em; text-shadow:0 0 18px var(--green); }
  header h1 span { color:var(--green-dim); font-weight:400; }
  .pill {
    display:flex; align-items:center; gap:8px; font-size:.72rem; letter-spacing:.1em;
    padding:5px 14px; border:1px solid var(--border); border-radius:3px; background:var(--panel);
  }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--red); box-shadow:0 0 8px var(--red); transition:.3s; }
  .dot.live { background:var(--green); box-shadow:0 0 8px var(--green); }

  /* ── Layout ── */
  main {
    width:100%; max-width:1160px; padding:20px;
    display:grid; grid-template-columns:1fr 300px; gap:20px;
  }

  /* ── Radar ── */
  .radar-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .canvas-shell {
    position:relative; width:500px; height:500px;
    border:1px solid var(--border); border-radius:50%;
    box-shadow:0 0 40px rgba(0,255,65,0.08), inset 0 0 60px rgba(0,0,0,0.6);
    background:radial-gradient(circle,#021205 60%,#010901 100%);
    overflow:hidden;
  }
  #radarCanvas { width:100%; height:100%; display:block; }
  .dist-labels { display:flex; justify-content:space-between; width:500px; font-size:.62rem; color:var(--green-dim); opacity:.6; }

  /* ── Panel ── */
  .panel { display:flex; flex-direction:column; gap:14px; }
  .card {
    background:var(--panel); border:1px solid var(--border);
    padding:14px; border-radius:4px; position:relative; overflow:hidden;
  }
  .card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--green); opacity:.5; }
  .ctitle { font-family:'Orbitron',monospace; font-size:.6rem; letter-spacing:.18em; color:var(--green-dim); margin-bottom:10px; }

  /* ── Bot status badge ── */
  .bot-badge {
    text-align:center; padding:12px 10px;
    border:1px solid var(--border); border-radius:4px;
    font-family:'Orbitron',monospace; font-weight:700; font-size:.85rem; letter-spacing:.15em;
    color:#1a5c25; background:#020c04;
    transition:color .2s, text-shadow .2s, background .2s, border-color .2s;
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .bot-badge.tracking {
    color:var(--amber); text-shadow:0 0 16px var(--amber); background:#1a0f00; border-color:var(--amber);
    animation:pulse-amber 1s ease-in-out infinite;
  }
  .bot-badge.idle { color:#1a5c25; }
  @keyframes pulse-amber { 0%,100%{box-shadow:0 0 8px rgba(255,183,0,.2);} 50%{box-shadow:0 0 22px rgba(255,183,0,.5);} }

  .bot-icon { font-size:1.6rem; }

  /* ── Odometer ── */
  .odo-wrap { display:flex; flex-direction:column; gap:8px; }
  .odo-row { display:flex; justify-content:space-between; align-items:baseline; }
  .odo-label { font-size:.68rem; color:var(--green-dim); letter-spacing:.08em; }
  .odo-val { font-family:'Orbitron',monospace; font-size:1.5rem; font-weight:700; text-shadow:0 0 12px var(--blue); color:var(--blue); }
  .odo-unit { font-size:.65rem; color:var(--green-dim); margin-left:4px; }
  .odo-sub { font-size:.72rem; color:#1a6040; }

  /* ── Distance bar ── */
  .dist-bar-bg { height:6px; background:#071a09; border-radius:2px; overflow:hidden; border:1px solid rgba(0,255,65,.1); margin-top:4px; }
  .dist-bar { height:100%; width:0%; background:linear-gradient(90deg,#00cfff,#00ff41); border-radius:2px; box-shadow:0 0 8px var(--blue); transition:width .15s; }

  /* ── Target rows ── */
  .trow { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; font-size:.76rem; }
  .trow .lbl { color:var(--green-dim); }
  .trow .val { font-family:'Orbitron',monospace; font-size:1rem; font-weight:700; text-shadow:0 0 10px var(--green); }
  .trow .val.off { color:#1a5c25; text-shadow:none; }
  .unit { font-size:.62rem; color:var(--green-dim); margin-left:3px; }

  /* ── Sig bar ── */
  .sbar-bg { height:5px; background:#071a09; border-radius:2px; overflow:hidden; border:1px solid rgba(0,255,65,.1); margin-top:3px; }
  .sbar { height:100%; width:0%; background:linear-gradient(90deg,#00c832,#00ff41); border-radius:2px; transition:width .12s; }

  /* ── History ── */
  #histChart { width:100%; height:55px; }

  /* ── Travel log ── */
  .log-box { height:130px; overflow-y:auto; font-size:.63rem; line-height:1.7; color:#2e8042; scrollbar-width:thin; scrollbar-color:var(--green-dk) transparent; }
  .log-box::-webkit-scrollbar { width:4px; }
  .log-box::-webkit-scrollbar-thumb { background:var(--green-dk); }
  .log-line { border-bottom:1px solid rgba(0,255,65,.05); padding:2px 0; }
  .log-line.alert { color:var(--amber); }
  .log-line.warn  { color:var(--red); }
  .log-line.info  { color:var(--blue); }

  /* ── IP config ── */
  .ip-row { display:flex; gap:6px; margin-bottom:8px; }
  .ip-row input {
    flex:1; background:#020c04; border:1px solid var(--border); color:var(--green);
    font-family:'Share Tech Mono',monospace; font-size:.76rem; padding:5px 9px; border-radius:3px; outline:none;
  }
  .ip-row input:focus { border-color:var(--green); }
  .btn { background:var(--green-dk); border:1px solid var(--green); color:var(--green); font-family:'Orbitron',monospace; font-size:.6rem; letter-spacing:.1em; padding:6px 11px; border-radius:3px; cursor:pointer; }
  .btn:hover { background:#004d17; }
  .btn.stop { border-color:var(--red); color:var(--red); background:#1a0000; }
  .btn.reset { border-color:var(--blue); color:var(--blue); background:#001a20; margin-top:6px; width:100%; }

  .hint { font-size:.6rem; color:#1a5c25; letter-spacing:.05em; }

  footer { font-size:.6rem; color:#1a4023; padding:8px; letter-spacing:.1em; }

  @media(max-width:860px) {
    main { grid-template-columns:1fr; }
    .canvas-shell,.dist-labels { width:340px; }
    .canvas-shell { height:340px; }
  }
</style>
</head>
<body>

<header>
  <h1>RADAR TRACKING BOT <span>/ LD2410C</span></h1>
  <div class="pill"><div class="dot" id="connDot"></div><span id="connLabel">OFFLINE</span></div>
</header>

<main>

  <!-- Radar canvas -->
  <div class="radar-wrap">
    <div class="canvas-shell">
      <canvas id="radarCanvas" width="500" height="500"></canvas>
    </div>
    <div class="dist-labels" id="distLabels"></div>
  </div>

  <!-- Right panel -->
  <div class="panel">

    <!-- Connection -->
    <div class="card">
      <div class="ctitle">// ESP32 CONNECTION</div>
      <div class="ip-row">
        <input type="text" id="espIp" placeholder="192.168.x.x" value="192.168.1.100"/>
        <button class="btn" id="connectBtn" onclick="togglePolling()">CONNECT</button>
      </div>
      <div class="hint">HTTP GET http://[IP]/data — 200ms poll</div>
    </div>

    <!-- Bot state -->
    <div class="bot-badge idle" id="botBadge">
      <span class="bot-icon" id="botIcon">⬛</span>
      <span id="botStateText">BOT IDLE</span>
    </div>

    <!-- Odometer -->
    <div class="card">
      <div class="ctitle">// ODOMETER</div>
      <div class="odo-wrap">
        <div class="odo-row">
          <span class="odo-label">TOTAL DISTANCE</span>
          <span><span class="odo-val" id="odoMM">0</span><span class="odo-unit">mm</span></span>
        </div>
        <div class="odo-row">
          <span class="odo-sub" id="odoCM">0.0 cm</span>
          <span class="odo-sub" id="odoM">0.000 m</span>
        </div>
        <div class="dist-bar-bg"><div class="dist-bar" id="odoBar"></div></div>
      </div>
      <button class="btn reset" onclick="resetOdo()">⟳ RESET ODOMETER</button>
    </div>

    <!-- Radar targets -->
    <div class="card">
      <div class="ctitle">// RADAR TARGETS</div>
      <div class="trow">
        <span class="lbl">MOVING</span>
        <span class="val off" id="moveDistVal">---<span class="unit">cm</span></span>
      </div>
      <div class="sbar-bg"><div class="sbar" id="moveSigBar"></div></div>
      <div style="margin-top:10px"></div>
      <div class="trow">
        <span class="lbl">STATIONARY</span>
        <span class="val off" id="statDistVal">---<span class="unit">cm</span></span>
      </div>
      <div class="sbar-bg"><div class="sbar" id="statSigBar"></div></div>
    </div>

    <!-- History chart -->
    <div class="card">
      <div class="ctitle">// DISTANCE HISTORY <span style="color:#ffb700">■</span> MOVE &nbsp;<span style="color:#00ff41">■</span> STAT</div>
      <canvas id="histChart"></canvas>
    </div>

    <!-- Log -->
    <div class="card">
      <div class="ctitle">// BOT LOG</div>
      <div class="log-box" id="logBox"></div>
    </div>

  </div>
</main>

<footer>RADAR TRACKING BOT — LIVE SERVER EDITION</footer>

<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const MAX_DIST    = 600;
const RING_COUNT  = 6;
const SWEEP_SPEED = 2;
const TRAIL_DECAY = 0.04;
const HIST_LEN    = 60;
const POLL_MS     = 200;
const ODO_MAX_MM  = 5000;  // bar fill cap (mm)

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let pollTimer    = null;
let sweepAngle   = -90;
let lastData     = null;
let blips        = [];
let histMove     = new Array(HIST_LEN).fill(0);
let histStat     = new Array(HIST_LEN).fill(0);
let prevPresence = false;
let prevMoving   = false;
let prevBotMove  = false;
let failCount    = 0;
let odoOffset    = 0;   // for local reset

// ══════════════════════════════════════════════
//  CANVAS
// ══════════════════════════════════════════════
const canvas = document.getElementById('radarCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W/2, CY = H/2, R = W/2 - 10;

const glowCanvas = document.createElement('canvas');
glowCanvas.width = W; glowCanvas.height = H;
const glowCtx = glowCanvas.getContext('2d');

// Build dist labels
(function() {
  const el = document.getElementById('distLabels');
  const labels = ['0'];
  for (let i = 1; i <= RING_COUNT; i++) labels.push(Math.round((MAX_DIST/RING_COUNT)*i)+'cm');
  el.innerHTML = labels.map(l=>`<span>${l}</span>`).join('');
})();

// ══════════════════════════════════════════════
//  RADAR DRAW
// ══════════════════════════════════════════════
function toXY(a, dist) {
  const r = (dist/MAX_DIST)*R;
  const rad = (a-90)*Math.PI/180;
  return { x: CX+r*Math.cos(rad), y: CY+r*Math.sin(rad) };
}

function drawGrid() {
  ctx.save();
  for (let i=1; i<=RING_COUNT; i++) {
    const r = (i/RING_COUNT)*R;
    ctx.beginPath(); ctx.arc(CX,CY,r,0,Math.PI*2);
    ctx.strokeStyle = `rgba(0,255,65,${i===RING_COUNT?0.25:0.1})`; ctx.lineWidth=.8; ctx.stroke();
  }
  [0,45,90,135].forEach(a => {
    const rad=(a-90)*Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(CX,CY); ctx.lineTo(CX+R*Math.cos(rad),CY+R*Math.sin(rad));
    ctx.moveTo(CX,CY); ctx.lineTo(CX-R*Math.cos(rad),CY-R*Math.sin(rad));
    ctx.strokeStyle='rgba(0,255,65,0.1)'; ctx.lineWidth=.8; ctx.stroke();
  });
  ctx.fillStyle='rgba(0,255,65,0.35)'; ctx.font='10px Share Tech Mono'; ctx.textAlign='center';
  [0,45,90,135,180,225,270,315].forEach(a => {
    const rad=(a-90)*Math.PI/180;
    ctx.fillText(a+'°', CX+(R+14)*Math.cos(rad), CY+(R+14)*Math.sin(rad)+4);
  });
  ctx.restore();
}

function drawSweep() {
  ctx.save();
  for (let i=0; i<60; i++) {
    const a = (sweepAngle-i-90)*Math.PI/180;
    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,R,a,a+1.1*Math.PI/180); ctx.closePath();
    ctx.fillStyle=`rgba(0,255,65,${((60-i)/60)*0.45})`; ctx.fill();
  }
  const sr = (sweepAngle-90)*Math.PI/180;
  ctx.beginPath(); ctx.moveTo(CX,CY);
  ctx.lineTo(CX+R*Math.cos(sr), CY+R*Math.sin(sr));
  ctx.strokeStyle='rgba(0,255,65,0.95)'; ctx.lineWidth=1.5;
  ctx.shadowBlur=10; ctx.shadowColor='#00ff41'; ctx.stroke();
  ctx.restore();
}

function drawBlips() {
  blips.forEach(b => {
    const pos = toXY(b.angle, b.dist);
    const alpha = Math.max(0, 1-b.age/60);
    const color = b.type==='moving' ? `rgba(255,183,0,${alpha})` : `rgba(0,255,65,${alpha})`;
    ctx.save();
    ctx.beginPath(); ctx.arc(pos.x,pos.y, b.type==='moving'?6:5, 0,Math.PI*2);
    ctx.fillStyle=color; ctx.shadowBlur=14;
    ctx.shadowColor=b.type==='moving'?'#ffb700':'#00ff41'; ctx.fill();
    if (b.age<20) {
      ctx.beginPath(); ctx.arc(pos.x,pos.y, (b.type==='moving'?6:5)+b.age*.8, 0,Math.PI*2);
      ctx.strokeStyle=b.type==='moving'?`rgba(255,183,0,${.4-b.age*.02})`:`rgba(0,255,65,${.4-b.age*.02})`;
      ctx.lineWidth=1; ctx.stroke();
    }
    ctx.restore();
    b.age++;
  });
  blips = blips.filter(b=>b.age<60);
}

// Draw small bot arrow at center pointing forward (up)
function drawBotArrow(isMoving) {
  ctx.save();
  ctx.translate(CX, CY);
  const color = isMoving ? '#ffb700' : '#00ff41';
  ctx.shadowBlur = isMoving ? 18 : 10;
  ctx.shadowColor = color;
  ctx.strokeStyle = color;
  ctx.fillStyle   = color;
  ctx.lineWidth = 2;
  // Arrow body
  ctx.beginPath();
  ctx.moveTo(0, -14); ctx.lineTo(0, 8);
  ctx.stroke();
  // Arrowhead
  ctx.beginPath();
  ctx.moveTo(0,-18); ctx.lineTo(-6,-8); ctx.lineTo(6,-8); ctx.closePath();
  ctx.fill();
  // Wheels (small dots)
  [[-7,4],[7,4]].forEach(([dx,dy]) => {
    ctx.beginPath(); ctx.arc(dx,dy,3,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();
  });
  ctx.restore();
}

function render() {
  requestAnimationFrame(render);
  sweepAngle = (sweepAngle + SWEEP_SPEED) % 360;

  if (lastData && lastData.presence) {
    if (lastData.moving && lastData.move_dist>0 && Math.random()<.15)
      blips.push({ angle:sweepAngle+(Math.random()-.5)*8, dist:lastData.move_dist+(Math.random()-.5)*10, age:0, type:'moving' });
    if (lastData.stationary && lastData.stat_dist>0 && Math.random()<.10)
      blips.push({ angle:sweepAngle+(Math.random()-.5)*6, dist:lastData.stat_dist+(Math.random()-.5)*8, age:0, type:'stationary' });
  }

  glowCtx.fillStyle=`rgba(2,12,4,${TRAIL_DECAY})`; glowCtx.fillRect(0,0,W,H);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='rgba(2,12,4,0.7)'; ctx.fillRect(0,0,W,H);
  ctx.drawImage(glowCanvas,0,0);
  drawGrid();
  drawSweep();
  drawBlips();
  drawBotArrow(lastData && lastData.bot_moving);
}

// ══════════════════════════════════════════════
//  HISTORY CHART
// ══════════════════════════════════════════════
const histCanvas = document.getElementById('histChart');
const hCtx = histCanvas.getContext('2d');
function drawHistory() {
  const W2=histCanvas.offsetWidth||240, H2=55;
  histCanvas.width=W2; histCanvas.height=H2;
  hCtx.clearRect(0,0,W2,H2);
  function line(data,color) {
    hCtx.beginPath();
    data.forEach((v,i)=>{ const x=(i/(HIST_LEN-1))*W2, y=H2-(v/MAX_DIST)*H2; i===0?hCtx.moveTo(x,y):hCtx.lineTo(x,y); });
    hCtx.strokeStyle=color; hCtx.lineWidth=1.5; hCtx.shadowBlur=6; hCtx.shadowColor=color; hCtx.stroke();
  }
  line(histMove,'#ffb700'); line(histStat,'#00ff41');
}

// ══════════════════════════════════════════════
//  UI UPDATE
// ══════════════════════════════════════════════
function updateUI(d) {
  // Bot badge
  const badge = document.getElementById('botBadge');
  const icon  = document.getElementById('botIcon');
  const txt   = document.getElementById('botStateText');
  if (d.bot_moving) {
    badge.className='bot-badge tracking';
    icon.textContent='🤖';
    txt.textContent='TRACKING TARGET';
  } else {
    badge.className='bot-badge idle';
    icon.textContent='⬛';
    txt.textContent='BOT IDLE';
  }

  // Odometer
  const displayMM = Math.max(0, d.total_dist_mm - odoOffset);
  const displayCM = displayMM / 10;
  const displayM  = displayMM / 1000;
  document.getElementById('odoMM').textContent = displayMM;
  document.getElementById('odoCM').textContent = displayCM.toFixed(1)+' cm';
  document.getElementById('odoM').textContent  = displayM.toFixed(3)+' m';
  document.getElementById('odoBar').style.width = Math.min(100,(displayMM/ODO_MAX_MM)*100)+'%';

  // Moving target
  const mvEl = document.getElementById('moveDistVal');
  if (d.moving && d.move_dist>0) {
    mvEl.innerHTML=`${d.move_dist}<span class="unit">cm</span>`; mvEl.classList.remove('off');
    document.getElementById('moveSigBar').style.width=Math.min(100,d.move_signal)+'%';
  } else {
    mvEl.innerHTML=`---<span class="unit">cm</span>`; mvEl.classList.add('off');
    document.getElementById('moveSigBar').style.width='0%';
  }

  // Stationary target
  const stEl = document.getElementById('statDistVal');
  if (d.stationary && d.stat_dist>0) {
    stEl.innerHTML=`${d.stat_dist}<span class="unit">cm</span>`; stEl.classList.remove('off');
    document.getElementById('statSigBar').style.width=Math.min(100,d.stat_signal)+'%';
  } else {
    stEl.innerHTML=`---<span class="unit">cm</span>`; stEl.classList.add('off');
    document.getElementById('statSigBar').style.width='0%';
  }

  // History
  histMove.push(d.moving     ? d.move_dist : 0); histMove.shift();
  histStat.push(d.stationary ? d.stat_dist : 0); histStat.shift();
  drawHistory();
}

// ══════════════════════════════════════════════
//  LOGGER
// ══════════════════════════════════════════════
function log(msg, cls='') {
  const box = document.getElementById('logBox');
  const t = new Date().toLocaleTimeString('en',{hour12:false});
  const div = document.createElement('div');
  div.className='log-line '+cls;
  div.textContent=`[${t}] ${msg}`;
  box.prepend(div);
  while (box.children.length>100) box.removeChild(box.lastChild);
}

function checkEvents(d) {
  if (d.presence   && !prevPresence) log('▲ Presence detected','alert');
  if (!d.presence  && prevPresence)  log('▼ Presence cleared');
  if (d.moving     && !prevMoving)   log(`→ Moving target @ ${d.move_dist}cm — bot moving`,'alert');
  if (!d.moving    && prevMoving)    log('■ Target lost — bot stopped');
  if (d.bot_moving && !prevBotMove)  log(`🤖 Bot tracking | dist: ${d.total_dist_mm}mm`,'info');
  prevPresence = d.presence;
  prevMoving   = d.moving;
  prevBotMove  = d.bot_moving;
}

// ══════════════════════════════════════════════
//  ODOMETER RESET (local offset only)
// ══════════════════════════════════════════════
function resetOdo() {
  if (!lastData) return;
  odoOffset = lastData.total_dist_mm;
  log('⟳ Odometer reset to 0','info');
}

// ══════════════════════════════════════════════
//  HTTP POLLING
// ══════════════════════════════════════════════
async function poll() {
  const ip  = document.getElementById('espIp').value.trim();
  try {
    const res = await fetch(`http://${ip}/data`, { signal: AbortSignal.timeout(1000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();
    failCount = 0;
    document.getElementById('connDot').classList.add('live');
    document.getElementById('connLabel').textContent='LIVE';
    lastData = d;
    checkEvents(d);
    updateUI(d);
  } catch(e) {
    failCount++;
    if (failCount===1) log(`⚠ Fetch error: ${e.message}`,'warn');
    if (failCount>=5) {
      document.getElementById('connDot').classList.remove('live');
      document.getElementById('connLabel').textContent='OFFLINE';
    }
  }
}

function togglePolling() {
  const btn = document.getElementById('connectBtn');
  if (pollTimer) {
    clearInterval(pollTimer); pollTimer=null;
    btn.textContent='CONNECT'; btn.classList.remove('stop');
    document.getElementById('connDot').classList.remove('live');
    document.getElementById('connLabel').textContent='OFFLINE';
    log('Polling stopped');
  } else {
    const ip=document.getElementById('espIp').value.trim();
    if (!ip) { log('Enter ESP32 IP first','warn'); return; }
    log(`Connecting → http://${ip}/data`);
    btn.textContent='STOP'; btn.classList.add('stop');
    failCount=0; poll();
    pollTimer=setInterval(poll, POLL_MS);
  }
}

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
render();
drawHistory();
log('System ready — enter ESP32 IP and click CONNECT');
</script>
</body>
</html>
